# Den of Wolves 2026 - Role Briefs
# Ultra-brief per-role reference sheet.
# logo-path fields are placeholders pending asset assignments.

briefs:

  # ─── ICSS AEGIS ───────────────────────────────────────────────────────────
  # The fleet's only battleship. Loyal to the Council; the shield that keeps
  # humanity alive.

  - name: Admiral
    team: Aegis
    role-brief: |
      As Admiral and commander of the only battleship in the fleet, you carry humanity's remaining military power in your hands. Strategic command. High-stakes diplomacy. Direct liaison with the President herself.

      You answer to the Council—but when seconds matter and lives are on the line, **act first… and answer for it afterward.**
    duty-brief:
      $ref: "#/duties/admiral"
    nation-brief:
      $ref: "#/nations/ICSS"
  - name: XO
    team: Aegis
    role-brief: |
      As second-in-command of the Aegis and direct commander of its **Marine squads**, you're in charge whenever the Admiral is away (which is often). When the Wolves attack, you coordinate Marine deployment across the entire fleet.
      
      **Keep the crew sharp.**

    duty-brief:
      $ref: "#/duties/xo"
    nation-brief:
      $ref: "#/nations/ICSS"
  - name: CAG
    team: Aegis
    role-brief: |
      As the CAG (Commander: Air Group), you control the Aegis' **fighter squadrons**. Pilot assignments, positioning, maintenance, and tactical deployment. The fleet's military superiority lives or dies by how well you manage those squadrons. Every pilot lost is a hole that's hard to fill.

    duty-brief:
      $ref: "#/duties/cag"
    nation-brief:
      $ref: "#/nations/ICSS"
  - name: Comms Officer
    team: Aegis
    role-brief: |
      As the **Aegis' ears and voice** across the fleet—third-in-command if both the Admiral and XO are gone—you gather intelligence for the Admiral and push critical information to other ships.
      
      Stay mobile, stay informed, and **make sure the right people always know what they need to know.**

    duty-brief:
      $ref: "#/duties/comms-officer"
    nation-brief:
      $ref: "#/nations/ICSS"
  - name: Logistics Officer
    team: Aegis
    role-brief: |
      You keep the Aegis stocked with food, water, fuel, and materials—and may assist other vessels in also obtaining these critical resources, as **any ship that can't move is a tomb**. Furthermore, you oversee the ship's transport shuttles.
      
      **Nothing moves without you.**

    duty-brief:
      $ref: "#/duties/logs-officer"
    nation-brief:
      $ref: "#/nations/ICSS"
  - name: Council Liaison
    team: Aegis
    role-brief: |
      As the Admiral's **authorized voice** in the Interstellar Council chambers—you may speak but cannot vote—you're the bridge between the military and the politicians.
      
      Your role is a two-way street: represent the Aegis' interests in political discussions while **keeping the crew briefed** on everything happening in civilian government.

    duty-brief:
      $ref: "#/duties/council-liaison"
    nation-brief:
      $ref: "#/nations/ICSS"
  # ─── STAR ALPHA ───────────────────────────────────────────────────────────
  # The Presidential vessel. A small repurposed luxury ship that is the seat
  # of Executive power - and the last real government humanity has.

  - name: President
    team: Star Alpha
    role-brief: |
      As **humanity's head of state**—the last in succession after the Attack—you lead the Interstellar Council, sign laws passed by it, and serve as Commander in Chief of the military (the Admiral answers to you).
      
      Your political roots are FAS, but the law demands neutrality—and the fleet is watching.
      
      **Keep the government strong. Keep the Admiral in line. Keep the fleet together.**

    duty-brief:
      $ref: "#/duties/president"
    nation-brief:
      $ref: "#/nations/ISC"
  - name: Vice President
    team: Star Alpha
    role-brief: |
      As the President's **eyes and ears** across the fleet—and the tiebreaker when Council deadlocks—your job is to get off the Star Alpha and onto other ships. Talk to people, take the temperature of the nations, stay tight with the Admiral.
      
      **If something goes wrong with the President, you're next in line.**

    duty-brief:
      $ref: "#/duties/vice-president"
    nation-brief:
      $ref: "#/nations/ISC"
  - name: Chief of Staff
    team: Star Alpha
    role-brief: |
      You run the Star Alpha's day-to-day operations: food, water, fuel, materials, security. You also support the President and VP on law enforcement when needed.
      
      The **administrative engine of the Presidency** runs through you—if politics is the face, **you're the spine.**

    duty-brief:
      $ref: "#/duties/chief-of-staff"
    nation-brief:
      $ref: "#/nations/ISC"
  - name: Parliamentarian
    team: Star Alpha
    role-brief: |
      You draft the language of proposed laws and bring them before Council to vote on. You're also a voting Council member yourself. In a fleet with **no surviving legal infrastructure**, the precision of what gets written matters enormously.
      
      You're the architect of whatever new laws this remnant of humanity will live by.
      
      **Build a world worth living in.**

    duty-brief:
      $ref: "#/duties/parliamentarian"
    nation-brief:
      $ref: "#/nations/ISC"
  # ─── THE DIONE (FAS) ──────────────────────────────────────────────────────
  # Luxury cruiser repurposed as home to 10,000 FAS civilians and the
  # Interstellar Council itself. The political heart of the fleet.

  - name: Captain
    team: Dione
    role-brief: |
      You command the **largest civilian vessel in the fleet** and home to the Interstellar Council. The Dione carries ~10,000 refugees—the majority FAS citizens, and the **largest group of survivors anywhere**.
      
      This population represents the greatest hope for mankind's continuation. Your ship needs the fleet's support to keep the human race alive—**remind them of this, loudly and often.**
      
      Protect the Council's home on your ship. Do not let Rosal undermine you.

    duty-brief:
      $ref: "#/duties/captain"
    nation-brief:
      $ref: "#/nations/FAS"
  - name: First Officer
    team: Dione
    role-brief: |
      You're the Captain's right hand on the ship that carries **ten thousand refugees**—the largest group of survivors anywhere. These people are mankind's future.
      
      Keep them safe, keep them calm, keep them alive.
      
      The Council meets on your ship—**make sure they remember whose hospitality makes their work possible.**

    duty-brief:
      $ref: "#/duties/first-officer"
    nation-brief:
      $ref: "#/nations/FAS"
  - name: Chief Engineer
    team: Dione
    role-brief: |
      You're keeping a **luxury cruiser** operational with ten thousand refugees aboard - the largest surviving population anywhere. The Dione wasn't built for this, but it's what humanity has. Every system you maintain keeps the future of the human race alive. That's not a burden. That's the most important engineering job in the fleet.

    duty-brief:
      $ref: "#/duties/chief-engineer"
    nation-brief:
      $ref: "#/nations/FAS"
  - name: Council Member
    team: Dione
    role-brief: |
      As the **FAS representative** on the Interstellar Council—and the voice of the **largest surviving population** anywhere—you vote on all legislation with the weight of ten thousand souls behind you.
      
      Defend Old Nation interests, keep Rosal in check, and maintain the coalition with CPA and SAN.
      
      The Council meets on your ship because the Dione is the **political heart of the fleet**—that's not an accident. **It should stay that way.**

    duty-brief:
      $ref: "#/duties/council-member"
    nation-brief:
      $ref: "#/nations/FAS"
  # ─── THE SHEPHERD (ROSAL) ─────────────────────────────────────────────────
  # The fleet's primary food production vessel. Rosal's independent spirit
  # is as important as the calories it grows.

  - name: Captain
    team: Shepherd
    role-brief: |
      You command the **ship that feeds the fleet**. Without the Shepherd's food production, people starve—and you know it.
      
      Use that leverage firmly but wisely. You represent Rosal's proud tradition of self-determination and standing up to Old Nation dominance.
      
      **Keep the food flowing. Keep Rosal relevant.**

    duty-brief:
      $ref: "#/duties/captain"
    nation-brief:
      $ref: "#/nations/Rosal"
  - name: First Officer
    team: Shepherd
    role-brief: |
      You keep the **ship that feeds the fleet** running. The Shepherd's leverage is absolute—but so is the weight on your shoulders.
      
      Embody Rosal's independent spirit. **Never back down to Old Nation pressure. Not once.**

    duty-brief:
      $ref: "#/duties/first-officer"
    nation-brief:
      $ref: "#/nations/Rosal"
  - name: Chief Engineer
    team: Shepherd
    role-brief: |
      The biological and mechanical systems you maintain **literally keep the fleet fed**. A breakdown here is a fleet emergency—which gives you serious political weight.
      
      **Use it.** Rosal didn't get this far by being polite.

    duty-brief:
      $ref: "#/duties/chief-engineer"
    nation-brief:
      $ref: "#/nations/Rosal"
  - name: Council Member
    team: Shepherd
    role-brief: |
      As **Rosal's voice** on the Interstellar Council—speaking for the ship that feeds the fleet—you vote on legislation with the leverage of starvation behind every word.
      
      Advocate loudly for New Nation rights. You may spend Team Phase at either the Shepherd or the Endeavour.
      
      **Push back against Old Nation power. Keep the FAS honest.** Build coalition with Gliese and Helvetii.

    duty-brief:
      $ref: "#/duties/council-member"
    nation-brief:
      $ref: "#/nations/Rosal"
  # ─── THE LUCAS (SAN) ──────────────────────────────────────────────────────
  # Primary water supply vessel and home to SAN engineering expertise.

  - name: Captain
    team: Lucas
    role-brief: |
      You command the fleet's **main water supplier**. The Lucas' distillation units provide most of the fleet's fresh water—an existential resource.
      
      Protect the ship and shuttle at all costs. SAN's reputation as an engineering and technical powerhouse lives on here.
      
      **Use it.**

    duty-brief:
      $ref: "#/duties/captain"
    nation-brief:
      $ref: "#/nations/SAN"
  - name: First Officer
    team: Lucas
    role-brief: |
      The Lucas supplies **most of the fleet's water** and hosts what's left of SAN's engineering university. Keep operations tight. Support the training programs.
      
      SAN's reputation as the technical powerhouse is your nation's strongest card—**play it well.**

    duty-brief:
      $ref: "#/duties/first-officer"
    nation-brief:
      $ref: "#/nations/SAN"
  - name: Chief Engineer
    team: Lucas
    role-brief: |
      You maintain the water distillation systems and oversee what's left of **SAN's Engineering University**. You can train engineers fleet-wide—a capability that makes you one of the most strategically important engineers alive.
      
      People need water. They also need knowledge.
      
      **You supply both.**

    duty-brief:
      $ref: "#/duties/chief-engineer"
    nation-brief:
      $ref: "#/nations/SAN"
  - name: Council Member
    team: Lucas
    role-brief: |
      As **SAN's representative** on the Interstellar Council—backed by the technical expertise and water supply the fleet depends on—you vote on legislation with quiet authority. You may spend Team Phase at the Lucas or Salvador.
      
      Maintain Old Nation alliances (especially with the CPA), figure out why the CPA has gone so quiet lately, and **make sure the fleet knows water comes from you.**

    duty-brief:
      $ref: "#/duties/council-member"
    nation-brief:
      $ref: "#/nations/SAN"
  # ─── THE ICEBREAKER (CPA) ─────────────────────────────────────────────────
  # Large CPA mining vessel - the fleet's main source of materials and ore.
  # Crewed by survivors with raw grief and a vendetta against the Wolves.

  - name: Captain
    team: Icebreaker
    role-brief: |
      You command the **fleet's primary mining ship**—main source of materials and strytium ore. The CPA lost more than anyone in the Attack. Your people's grief is real and sharp.
      
      Maintain production. Protect the fleet's industrial backbone.
      
      **Make sure no one forgets what the Wolves did.**

    duty-brief:
      $ref: "#/duties/captain"
    nation-brief:
      $ref: "#/nations/CPA"
  - name: First Officer
    team: Icebreaker
    role-brief: |
      The CPA **lost more than any other nation** in the Wolf Attack. Your crew's grief is real, sharp, and yours to manage.
      
      Keep the mining operations running. Keep the civilians stable.
      
      But **never—never—forget what was taken from you.**

    duty-brief:
      $ref: "#/duties/first-officer"
    nation-brief:
      $ref: "#/nations/CPA"
  - name: Chief Engineer
    team: Icebreaker
    role-brief: |
      The Icebreaker's mining drones are the **fleet's industrial backbone**. Keep them operational no matter what. Every piece of ore you extract is a small victory over the Wolves who tried to destroy everything. Make every ton count.

    duty-brief:
      $ref: "#/duties/chief-engineer"
    nation-brief:
      $ref: "#/nations/CPA"
  - name: Council Member
    team: Icebreaker
    role-brief: |
      As the **CPA's representative** on the Interstellar Council—speaking for a nation that paid the **highest price** in the Attack—you vote on legislation with grief and fury in equal measure.
      
      Defend Old Nation alliances and make sure the fleet never becomes sympathetic to the Wolves. Push for surveillance and proactive anti-Wolf measures.
      
      **Your people's sacrifice must carry political weight.**

    duty-brief:
      $ref: "#/duties/council-member"
    nation-brief:
      $ref: "#/nations/CPA"
  # ─── REFINERY 124 (GLIESE) ────────────────────────────────────────────────
  # The fleet's fuel source. Without strytium, the fleet stops running.

  - name: Captain
    team: Refinery 124
    role-brief: |
      You command the ship that **keeps the fleet moving**. Refinery 124 processes strytium ore into fuel every vessel needs to survive. Gliese's strength has always been quiet, industrial, essential - you embody that. Use your resource leverage as soft power in Council. Ensure workers' rights are never an afterthought.

    duty-brief:
      $ref: "#/duties/captain"
    nation-brief:
      $ref: "#/nations/Gliese"
  - name: First Officer
    team: Refinery 124
    role-brief: |
      Without strytium fuel, the fleet **stops moving**. Your ship produces it. Gliese has always been quiet, essential, underestimated.
      
      Embody that. Let the fuel tap do the talking.
      
      **Soft power beats loud rhetoric every single time.**

    duty-brief:
      $ref: "#/duties/first-officer"
    nation-brief:
      $ref: "#/nations/Gliese"
  - name: Chief Engineer
    team: Refinery 124
    role-brief: |
      You run the **most technically demanding operation in the fleet**. Downtime here is a fleet-wide emergency. That makes you one of the most strategically critical engineers alive. Don't let the fleet forget it.

    duty-brief:
      $ref: "#/duties/chief-engineer"
    nation-brief:
      $ref: "#/nations/Gliese"
  - name: Council Member
    team: Refinery 124
    role-brief: |
      As **Gliese's voice** on the Interstellar Council—representing the workers who keep the fleet moving—you vote on legislation with the fuel tap behind you.
      
      Gliese prefers soft power to loud rhetoric. **Let your leverage speak.**
      
      Ally with Rosal on New Nation issues, advocate for workers' rights and efficient resource policy, and call out inefficiency wherever you find it.

    duty-brief:
      $ref: "#/duties/council-member"
    nation-brief:
      $ref: "#/nations/Gliese"
  # ─── THE QUELLON (PROXIMA) ────────────────────────────────────────────────
  # Proxima's operations vessel - water supply, fighter squadrons,
  # and fierce self-reliance.

  - name: Captain
    team: Quellon
    role-brief: |
      You command **Proxima's primary vessel**—a significant water producer and fighter carrier. Proxima's identity is self-sufficiency.
      
      **Live it.**
      
      Protect Proximan interests, keep your fighters ready, and never let anyone tell you Proxima needs to depend on others to survive.

    duty-brief:
      $ref: "#/duties/captain"
    nation-brief:
      $ref: "#/nations/Proxima"
  - name: First Officer
    team: Quellon
    role-brief: |
      Proxima's pride is **self-sufficiency**. The Quellon produces water and fields fighters - living proof you don't need anyone's charity. Keep operations tight. Never give the Old Nations an excuse to condescend. Not even once.

    duty-brief:
      $ref: "#/duties/first-officer"
    nation-brief:
      $ref: "#/nations/Proxima"
  - name: Chief Engineer
    team: Quellon
    role-brief: |
      Proxima doesn't ask for hand-outs. Your job is to make sure the Quellon **never has to**. Self-sufficiency isn't just politics - it's engineering discipline. Live it.

    duty-brief:
      $ref: "#/duties/chief-engineer"
    nation-brief:
      $ref: "#/nations/Proxima"
  - name: Council Member
    team: Quellon
    role-brief: |
      As **Proxima's representative** on the Interstellar Council—voice of a nation that refuses to beg—you vote on legislation with fierce independence. You may spend Team Phase at the Quellon or the Vulcan.
      
      Advocate hard for Proximan self-sufficiency and redundancy fleet-wide. Push back against Old Nation dominance.
      
      **Keep close ties with the Vulcan crew.**

    duty-brief:
      $ref: "#/duties/council-member"
    nation-brief:
      $ref: "#/nations/Proxima"
  # ─── THE ENDEAVOR (ROSAL) ─────────────────────────────────────────────────
  # A small research vessel - home to most of humanity's remaining scientists,
  # one golden retriever, and one chimpanzee.

  - name: Captain
    team: Endeavor
    role-brief: |
      You command the most **scientifically important ship in the fleet**. The Endeavor carries the majority of humanity's surviving scientists—if something can be figured out, it gets figured out here.
      
      Protect your crew. Manage the politics between Rosal idealism and scientific pragmatism.
      
      **Make sure the scientists stay focused on keeping the fleet alive.**

    duty-brief:
      $ref: "#/duties/captain"
    nation-brief:
      $ref: "#/nations/Rosal"
  - name: Chief Scientist
    team: Endeavor
    role-brief: |
      You lead **humanity's last surviving research faculty**. Your team develops upgrades and technical solutions for all fleet vessels. Be creative—propose ambitious projects. Reach out to the Baltar for collaboration.
      
      Watch for religious or political interference with scientific progress.
      
      **The fleet survives on human ingenuity.**

    duty-brief:
      $ref: "#/duties/chief-scientist"
    nation-brief:
      $ref: "#/nations/Rosal"
  # ─── THE SALVADOR (SAN) ───────────────────────────────────────────────────
  # The fleet's only hospital ship.

  - name: Captain
    team: Salvador
    role-brief: |
      You command the **only dedicated medical vessel in the fleet**. The Salvador is indispensable—people live or die based on what you do here.
      
      Make sure medical services run, your crew is supported, and SAN's voice is heard through the Lucas Council member. Keep close ties with the Lucas.
      
      **Never let anyone overlook the Salvador's role in keeping people alive.**

    duty-brief:
      $ref: "#/duties/captain"
    nation-brief:
      $ref: "#/nations/SAN"
  - name: Head Surgeon
    team: Salvador
    role-brief: |
      As the **most experienced doctor alive**—practically the only one—you treat the wounded, train more doctors, and advocate for medical staffing across the fleet.
      
      You have some creative pharmaceutical ideas worth exploring—the Endeavor's scientists may be useful partners.
      
      You're also deeply concerned about the prisoners on the Vulcan. **What you do about that concern is up to you.**

    duty-brief:
      $ref: "#/duties/head-surgeon"
    nation-brief:
      $ref: "#/nations/SAN"
  # ─── THE VULCAN (PROXIMA) ─────────────────────────────────────────────────
  # A prison transport that earned its place in the fleet through firepower
  # and labor.

  - name: Captain
    team: Vulcan
    role-brief: |
      You command a **prison transport** with weapon batteries and 413 prisoners. Your arrival in the fleet was controversial. Prove the Vulcan's worth through firepower and labor. Defend Proximan interests. Don't apologize for what you are.

    duty-brief:
      $ref: "#/duties/captain"
    nation-brief:
      $ref: "#/nations/Proxima"
  - name: Warden
    team: Vulcan
    role-brief: |
      As manager of the **prison population**—a source of labor the fleet needs but doesn't fully trust—you walk a fine line. Keep the prisoners productive. Keep them under control.
      
      Resist any insinuations that your crew mistreats them.
      
      **Your labor pool and the Vulcan's weapons are Proxima's biggest contributions to fleet survival.**

    duty-brief:
      $ref: "#/duties/warden"
    nation-brief:
      $ref: "#/nations/Proxima"
  # ─── PRESS ────────────────────────────────────────────────────────────────
  # The fleet's news media - information brokers, morale shapers, and the
  # closest thing to accountability this remnant of humanity has.

  - name: Editor-in-Chief
    team: INC
    role-brief: |
      As leader of the **Interstellar News Corporation**—the only organization in the fleet with unrestricted freedom of movement—you oversee editorial direction, manage the broadcast schedule, and allocate your reporters strategically.
      
      Your team shapes morale across the fleet: positive coverage helps ships, negative coverage hurts.
      
      **Broadcast power is real power. Use it seriously, not sensationally.**

    duty-brief:
      $ref: "#/duties/editor-in-chief"
    nation-brief:
      $ref: "#/nations/INC"
  - name: Lead Anchor
    team: INC
    role-brief: |
      You chase the **big story**. You have the instincts and source network to get information others can't. Cultivate relationships with key players. Break the most important stories of the game.
      
      Always know more than you let on.
      
      You have freedom of movement—**use it to be where history happens.**

    duty-brief:
      $ref: "#/duties/lead-anchor"
    nation-brief:
      $ref: "#/nations/INC"
  - name: Fleet Correspondent
    team: INC
    role-brief: |
      You cover the **fleet's day-to-day pulse** - ship operations, civilian conditions, inter-vessel relationships. You're the generalist on the team, circulating widely and building relationships across all ships. Look for the human stories that shape morale.

    duty-brief:
      $ref: "#/duties/fleet-correspondent"
    nation-brief:
      $ref: "#/nations/INC"
  - name: Military Correspondent
    team: INC
    role-brief: |
      You cover the **military side of the fleet**—the Aegis, the Javelin, the Vulcan, and tactical events during Wolf attacks.
      
      Build trust with the Admiral and military leadership to get access while retaining editorial independence.
      
      **Report on battles, readiness, and the human cost of war.**

    duty-brief:
      $ref: "#/duties/military-correspondent"
    nation-brief:
      $ref: "#/nations/INC"
  - name: Political Correspondent
    team: INC
    role-brief: |
      You cover the **Council, the Presidency**, and political maneuvering between nations. You're allowed to observe Council proceedings—a rare privilege.
      
      Track legislation, alliances, vote tallies, and **the gap between what politicians say publicly and what they do privately.**

    duty-brief:
      $ref: "#/duties/political-correspondent"
    nation-brief:
      $ref: "#/nations/INC"
  # ─── SOLO ROLES ───────────────────────────────────────────────────────────

  - name: Arbourist
    team: wildcard
    role-brief: |
      You're the **Prophet of the Universal Arbour**—a rapidly growing new religion built on the belief that the Universe is sentient and speaks to you through visions.
      
      Weeks ago you had dozens of followers. Now you have hundreds, and growing. You roam the entire fleet freely.
      
      Gain followers. Gain political influence. **Decide what kind of prophet you want to be: shepherd, demagogue, or revolutionary.**

    duty-brief:
      $ref: "#/duties/arbourist"
  - name: Inquisitor
    team: wildcard
    role-brief: |
      You're the **last Inquisitor General in the fleet**—Proxima's surviving judicial authority, and the only judicial authority of any kind. Judge, jury, and prosecutor.
      
      Your power is technically unlimited but practically tenuous: the Council can curtail you if you go too far.
      
      Investigate traitors. Root out Wolf agents. Keep an independent judiciary alive.

      **Do what needs to be done.**

    duty-brief:
      $ref: "#/duties/inquisitor"
  - name: Firebrand
    team: wildcard
    role-brief: |
      You're a **political prisoner from Gilese**—populist, charismatic, and just released after a decade of imprisonment for anti-FAS activism. A stencil of your face is a symbol of resistance across what's left of human space.
      
      You were on the Vulcan when the Attack happened, your sentence was illegally extended, and you're now being held on the Aegis.
      
      Once free, your voice could reshape the fleet's politics. You have strong support among workers and prisoners.
      
      **Use it—or decide what it means that you have it.**

    duty-brief:
      $ref: "#/duties/firebrand"
  # ─── THE HEPHAESTUS (HELVETII) ────────────────────────────────────────────
  # A patchwork industrial vessel crewed entirely by pardoned former criminals
  # on a Helvetii rehabilitation program.

  - name: Captain
    team: Hephaestus
    role-brief: |
      You command a jury-rigged industrial jack-of-all-trades crewed by **reformed criminals** in the Helvetii rehabilitation program. They're rowdy but capable.
      
      Your ship has prospecting lasers, a makeshift refinery, repair facilities—plus Riot Police for when the crew gets out of hand.
      
      Maintain neutrality. Push for free trade. You already know Helvetii belongs at the table.
      
      **Now you have to prove it.**

    duty-brief:
      $ref: "#/duties/captain"
    nation-brief:
      $ref: "#/nations/Helvetii"
  - name: First Officer
    team: Hephaestus
    role-brief: |
      You manage a crew of **reformed criminals** every single day. They're capable but volatile.
      
      Balance operational discipline with Helvetii's rehabilitation philosophy—and **know when the Riot Police are the only answer left.**

    duty-brief:
      $ref: "#/duties/first-officer"
    nation-brief:
      $ref: "#/nations/Helvetii"
  - name: Chief Engineer
    team: Hephaestus
    role-brief: |
      You maintain a ship so heavily modified its original designers wouldn't recognize it—and you've **made it work**.
      
      Your breakthrough: alloying scrap metal into military-grade armor plating. That innovation could save lives fleet-wide.
      
      **Make sure it does.**

    duty-brief:
      $ref: "#/duties/chief-engineer"
    nation-brief:
      $ref: "#/nations/Helvetii"
  - name: Diplomat (Council Member)
    team: Hephaestus
    role-brief: |
      As **Helvetii's representative** in the Interstellar Council—junior member status, which means you can speak but not yet vote—you're fighting for legitimacy.
      
      Push for full Council membership. Advocate for free trade and neutral arbitration.
      
      **Consider whether the role of Parliamentarian—lawmaker—might one day be yours.**

    duty-brief:
      $ref: "#/duties/diplomat"
    nation-brief:
      $ref: "#/nations/Helvetii"
  # ─── THE BALTAR (HELVETII) ────────────────────────────────────────────────
  # A cutting-edge Helvetii research vessel with a multinational science crew.

  - name: Captain
    team: Baltar
    role-brief: |
      You command Helvetii's **state-of-the-art research ship**, purpose-built for long-range scanning and resource prospecting. Your crew is multinational and doesn't feel tightly bound to Helvetii neutrality, though _you_ may.
      
      Find asteroids. Find resources. Find opportunities—and **forge your own political identity distinct from the Hephaestus' orthodoxy.**

    duty-brief:
      $ref: "#/duties/captain"
    nation-brief:
      $ref: "#/nations/Helvetii"
  - name: Chief Scientist
    team: Baltar
    role-brief: |
      You lead a **multinational science team** in physical and material sciences, long-range observation, and resource prospecting. Reach out to the Endeavor—your research overlaps with theirs in important ways, and collaboration could benefit the whole fleet.
      
      **Your team's independence from Helvetii neutrality is a feature, not a bug.**

    duty-brief:
      $ref: "#/duties/chief-scientist"
    nation-brief:
      $ref: "#/nations/Helvetii"
  # ─── ICSS JAVELIN ─────────────────────────────────────────────────────────
  # The fleet's newest missile boat - green crew, prototype weapons, and a
  # burning desire to hit back.

  - name: Captain
    team: Javelin
    role-brief: |
      You were still on **shakedown cruise** when the Attack happened. Your crew watched Old Earth burn from Jupiter orbit—they're green, but they're furious.
      
      The Javelin's prototype missiles are powerful and expensive. You answer to the Admiral.
      
      **But if there's a clear shot at the Wolves? You'll take it.**

    duty-brief:
      $ref: "#/duties/captain"
    nation-brief:
      $ref: "#/nations/ICSS"
  - name: XO
    team: Javelin
    role-brief: |
      You command the Javelin's **Marines** and serve as the Captain's second-in-command. The Javelin's crew is green, but they're furious. They want to hit back at the Wolves—and they want to hit hard.
      
      **Stay vigilant.**

    duty-brief:
      $ref: "#/duties/xo"
    nation-brief:
      $ref: "#/nations/ICSS"
  - name: Chief Engineer
    team: Javelin
    role-brief: |
      Not only are you saddled with overall ship maintenance, you also maintain the Javelin's **prototype missile launchers**—finicky and temperamental doesn't come close to describing them.
      
      Keep the Javelin battle-ready at all times—she might not be as strong as the Aegis, but she is well-armored and punches way above her weight.
      
      **Keep her that way.**

    duty-brief:
      $ref: "#/duties/chief-engineer"
    nation-brief:
      $ref: "#/nations/ICSS"
  - name: Staff Sergeant
    team: Javelin
    role-brief: |
      The Marines take orders from the XO, but they **listen** to you. Battle-hardened and respected. Keep your people alive, execute the XO's tactical orders, and make sure the Javelin's ground forces hit harder than anything the Wolves expect.
      
      **Lead them well.**

    duty-brief:
      $ref: "#/duties/staff-sergeant"
    nation-brief:
      $ref: "#/nations/ICSS"
  # ─── THE FUERZA LEON (CPA) ────────────────────────────────────────────────
  # A CPA bulk hauler with vast, disorganized cargo bays and a crew of
  # skilled specialists traveling aboard as passengers.

  - name: Captain
    team: Fuerza Leon
    role-brief: |
      You command a **CPA bulk hauler** with vast cargo capacity and several highly skilled CPA specialists aboard as passengers. Emergency jumps scattered your manifest and jettisoned some cargo—but that means you have **flexibility**.
      
      Those specialists are valuable. Your empty bays can become anything the fleet needs. You can leverage both.
      
      **The CPA needs wins—deliver them.**

    duty-brief:
      $ref: "#/duties/captain"
    nation-brief:
      $ref: "#/nations/CPA"
  - name: First Officer
    team: Fuerza Leon
    role-brief: |
      You're running a ship with **CPA specialist passengers** whose expertise could be decisive for the fleet. The manifest is scattered and the permanent crew is lean—but that means you're nimble.
      
      Keep everyone organized. Keep the ship operational. Help the Captain turn potential into leverage.
      
      **The CPA needs wins.**

    duty-brief:
      $ref: "#/duties/first-officer"
    nation-brief:
      $ref: "#/nations/CPA"
nations:

  FAS:
    display-name: Federated Atlantic Syndicate (FAS)
    logo-path: ""
    nation-brief: |
      The FAS long defined itself by financial power and a relentless need to demonstrate its own superiority. Whatever financial infrastructure backed that power is now ash.
      
      But the FAS's talent for diplomacy and political maneuvering—honed over centuries—translates readily to the new Council chambers aboard the _Dione_, which is itself a former FAS vessel now repurposed as the seat of government.

      **Right were it should be.**

  CPA:
    display-name: Confederated Peoples of Asia (CPA)
    logo-path: ""
    nation-brief: |
      The CPA was the government of most of the East Asian landmass, built on a strong emphasis on national identity and collective purpose. Long rivals of the FAS, the centuries had pulled the two into an uneasy alignment as the New Nations rose. But the CPA's defining wound predates all of that: Wolf 1061 was a mostly CPA-held system when the Wolf War of Independence (WWI) broke out—and the Wolves showed little mercy to her soldiers and citizens there.
      
      Though WWI eventually drew in every nation, the CPA paid the steepest price... and the Attack has ripped that old scar wide open.
      
      For the CPA survivors now aboard the _Icebreaker_ and _Fuerza Leon_, grief and fury are never far from the surface.

  SAN:
    display-name: South American Nations (SAN)
    logo-path: ""
    nation-brief: |
      The historic nations of Central and South America combined to form the SAN, and were long-standing political allies of the CPA, bound together by a common wariness of the FAS. As the New Nations rose, that old solidarity faded, and the SAN found itself more focused on simply having a voice among louder, more powerful neighbors.
      
      In the Survivor Fleet, SAN civilians are concentrated aboard the _Lucas_ and the _Salvador_—a water-supply vessel and a hospital ship.
      
      Quieter than the others—but no less formidable—the SAN now finds its people doing some of the most essential work in the fleet.
  Rosal:
    display-name: Rosal
    logo-path: ""
    nation-brief: |
      One of the earliest planets to be colonized, Rosal was also the first to win independence—through a violent war against FAS rule, followed by treaties with the CPA and SAN that formalized their sovereignty in exchange for economic concessions. They've never let anyone forget it. Rosal is loud in the Council, unafraid to challenge Old or New Nations alike when they believe a wrong is being done. 
      
      In the Survivor Fleet, Rosal's civilians are concentrated aboard the _Shepherd_ and the _Endeavour_.
      
      That independent streak—the one that started a war of liberation centuries ago—is still very much alive.

  Proxima:
    display-name: Proxima
    logo-path: ""
    nation-brief: |
      Settlement on Proxima B began around the same time as Rosal, but independence came much later and with far less bloodshed—primarily a sweeping political change driven by garrison forces who saw themselves as Proximans first. That individualistic streak runs deep and has always created friction with more diplomatically minded nations. 
      
      In the Survivor Fleet, Proxima's people are aboard the _Quellon_ and the _Vulcan_—the latter a prison transport whose arrival caused no shortage of controversy. Proxima's self-reliance can be an asset in a crisis.
      
      Whether that translates to coöperation is another question.

  Gliese:
    display-name: Gliese
    logo-path: ""
    nation-brief: |
      Gliese's history has always been defined by what lies beneath its surface. The planet of Gliese 832C was quickly recognized by early scouts as a rich source of rare minerals, and it became one of the largest providers of strytium ore in known space. Independence came through a combination of violence and industrial action—Gliese didn't just fight for sovereignty, it fought for control of its own destiny.
      
      In the Survivor Fleet, that expertise is essential: _Refinery 124_, crewed by Gliese workers, is the fleet's primary source of the strytium fuel that keeps it ahead of the Wolf Navy. 
      
      **Without Gliese, the fleet stops moving.**

  Helvetii:
    display-name: Helvetii
    logo-path: ""
    nation-brief: |
      The youngest of the New Nations, Helvetii was founded not through rebellion but through wandering—apolitical refugees from the wars of independence who drifted for decades before discovering an uncharted asteroid cluster rich in rare elements.

      Their constitution is built around neutrality, and they were regularly called upon to mediate when Council negotiations reached an impasse.
      
      In the Survivor Fleet, Helvetii's people crew the _Hephaestus_ and the _Baltar_.
      
      Their neutrality is now the most complicated position in the fleet: when everything and everyone has been attacked, what does it mean to take no side?

  ISC:
    display-name: Interstellar Council
    logo-path: ""
    nation-brief: |
      The Interstellar Council is the civilian government of the Survivor Fleet—the fragile framework holding together what's left of human civilization.
      
      Born from Old Earth's diplomatic apparatus, the Council represents all seven voting nations and mediates between competing interests with the authority of law, treaty, and necessity.
      
      The President leads, the Parliamentarian legislates, and the Council votes.
      
      For now, that's enough to keep the fleet from tearing itself apart. Whether it _stays_ enough is the question underlying every session.

  ICSS:
    display-name: ICSS
    logo-path: ""
    nation-brief: |
      The ICSS—the military arm of the Council—are what stands between the Survivor Fleet and annihilation. The _Aegis_ and the _Javelin_ are the only warships humanity has left, crewed by personnel who swore an oath to serve the Council above any nation. They're the shield, the sword, and the last line of defense.
      
      The Admiral answers to the President, but when the Wolves attack, command decisions are measured in seconds—not political debates.
      
      **The ICSS keeps the fleet alive and everyone knows it.**

  INC:
    display-name: Interstellar News Corp.
    logo-path: ""
    nation-brief: |
      INC is the only independent press outlet in the Survivor Fleet—and they're great at it. Granted a mandate by the Council to operate free of political interference, INC reporters constantly move around the fleet to chase down leads and report on the truth.
      
      **Whether anyone in power actually likes what they report is another matter entirely.**


# Den of Wolves 2026 - Duty Briefs
# Mechanical duty summaries by role, for badge backs.
# Wildcard solo roles are marked TBD pending separate briefings.

duties:

  # --- COMMON SHIP ROLES ---

  captain: |
    Final authority on all major decisions for your ship. You are responsible for the safety of the ship and everyone aboard. When your First Officer is indisposed, you assume direct command of security forces.

    If your ship has weapon batteries (Vulcan, Javelin), you must report to the Fleet Map when a Wolf Attack is announced to direct them.

  first-officer: |
    Second-in-command. You take full command when the Captain is absent or incapacitated.

    On civilian ships you are responsible for security and have direct control over any security forces, weapon batteries, and fighter squadrons your ship carries. You are also responsible for crew counters: maintaining adequate crew levels and tracking any crew moved between ships.

    If your ship has fighter squadrons (Dione, Icebreaker, Quellon), you must report to the Fleet Map when a Wolf Attack is announced to direct them.

  chief-engineer: |
    You keep the ship operational. Your primary responsibility is repairs and ensuring the ship has the food, water, fuel, and materials it needs. You are also responsible for the ship's shuttle, if it has one, and are accountable for all shuttle operations on your ship regardless of who is piloting.

  council-member: |
    You represent your nation at the Interstellar Council. You attend Council each turn to debate and vote on legislation. Council meets in closed session — only Council members, the President, Vice President, the Aegis Liaison, and News Media may be present.

    Once per game you may call a vote of no confidence against the Parliamentarian (majority needed to remove them). You may also participate in a Snap Election for a new President (requires 5/7ths Council vote; only once per game; all players vote from among current Council members).

  diplomat: |
    Junior Helvetii representative to the Interstellar Council. You may speak at Council but do not hold a vote at game start. You may spend the Team Phase at either Helvetii vessel.

  # --- SPECIALIST SHIP ROLES ---

  chief-scientist: |
    You run the day-to-day research operations of your vessel. You spend Science resources to execute Science Projects, producing upgrades and new capabilities for the fleet. Starter project cards are provided, but you may propose new ideas to Control at any time.

  head-surgeon: |
    You manage the Salvador's medical operations. Wounded crew can be healed at the Sickbay station. Players who are Wounded in-game must report to a ship with an undamaged Sickbay; they do not consume station capacity and the station remains usable. Advocate for training additional doctors fleet-wide.

  warden: |
    You manage the Vulcan's prison population — the ship's primary labor pool. Prison labor can be assigned to tasks as delegated by the Captain. Units follow standard movement rules and cannot activate stations. Watch for unrest; the prisoner population is a riot risk.

  # --- AEGIS CREW ---

  admiral: |
    You command the fleet's only warship, functioning as its Captain with full command authority. The Aegis is legally bound to serve the President as Commander in Chief. In urgent situations without time to consult, you may act independently but will be held accountable afterward.

    Wolf Attack: report to the Fleet Map to direct the Aegis' weapon batteries and shield projector. The shield projector can protect one quadrant at the start of a Wolf Attack, absorbing incoming damage from other ships in that quadrant onto the Aegis.

    Note: Aegis takes morale penalties per 3 damage taken per turn (not per 1 like other ships).

  xo: |
    Second-in-command of the ship. You have direct control over the ship's Marine squads and take full command when the Captain/Admiral is off-ship.

    Wolf Attack: report to the Fleet Map when the attack is announced. After the first round of combat, you may return to your ship to coordinate Marine reinforcements to vessels where boarders have landed.

    ICS Marines get +2 to all combat rolls against on-foot units. This bonus does not apply to dispersing riots.

  cag: |
    Commander Air Group — you have direct control of all Aegis fighter squadrons. You manage pilot assignments, positioning, and maintenance between engagements.

    Wolf Attack: report to the Fleet Map to direct the Aegis fighters each round. Each squadron may either move to another quadrant or attack Wolf units in its current quadrant. When a fleet fighter squadron is damaged or destroyed, one Pilot crew in your hangar bay becomes wounded (resolved after the attack).

  comms-officer: |
    You manage fleet-wide communications for the Aegis — relaying information to and from the Admiral and other ships. You are third-in-command of the Aegis if both the Admiral and XO are off-ship or indisposed.

  logs-officer: |
    You ensure the Aegis has the food, water, fuel, and materials it needs. You are ultimately responsible for the ship's transport shuttles, though you may delegate day-to-day operations. You may assist other fleet vessels in sourcing critical resources.

  council-liaison: |
    You are authorized to speak at the Interstellar Council on the Admiral's behalf, but you do not hold a vote. Represent Aegis interests in Council discussions and keep the crew briefed on political developments from the chambers.

  # --- STAR ALPHA CREW ---

  president: |
    Head of the executive branch. You sign all Council legislation into Law — without your signature it does not become Law. You are Commander in Chief; the Admiral and all military personnel are legally bound to follow your orders. Laws are enforced by you, the Vice President, and the Chief of Staff by default.

    Special power — Presidential Veto: You may refuse to sign or veto any legislation. A veto can be overridden by a 5/7ths Council vote.

    In extreme time-critical situations you may give direct orders to the Admiral without Council consultation, but improper use may result in serious legal charges.

  vice-president: |
    Second-in-command of the executive branch. You uphold and enforce the laws of the Council alongside the President. You become President if the current President is killed, incapacitated, or unable to serve. Laws are enforced by you, the President, and the Chief of Staff by default.

    Special power — Tiebreaker: You do not vote in Council under normal circumstances. You cast the deciding vote only when the Council is tied.

  chief-of-staff: |
    You manage the day-to-day operations of the Star Alpha: food, water, fuel, materials, and internal security. You support the President and Vice President in law enforcement as needed. Laws not otherwise assigned are enforced by you, the President, and Vice President.

  parliamentarian: |
    Leader of the legislative branch and a voting Council member.

    Special power — Legislative Control: You are the only player who can write legislation and bring it to a vote. You control the language of all proposed laws. Legislation requires a Council majority vote and the President's signature to become Law.

    A majority Council vote of no confidence can strip you of this role. If removed, no new legislation can be proposed until a new Parliamentarian is elected by plurality from among all Council members.

  # --- JAVELIN CREW ---

  staff-sergeant: |
    You command the Javelin's Marine squads on the ground. Marines take orders from the XO in the chain of command, but they answer to you in the field. You have special combat abilities that provide an edge in close-quarters fighting.

    ICS Marines get +2 to all combat rolls against on-foot units. This bonus does not apply to dispersing riots.

  # --- NEWS MEDIA ---

  editor-in-chief: |
    Full News Media freedom of movement — no ship table restrictions. Part of the broadcast team producing one ~4-minute report per turn with direct mechanical effects on fleet morale. News Media are the only non-Council players permitted to observe Council sessions without explicit Council invitation. Other players cannot make room-wide announcements without working through the Media team.

  lead-anchor: |
    Full News Media freedom of movement — no ship table restrictions. Part of the broadcast team producing one ~4-minute report per turn with direct mechanical effects on fleet morale. News Media are the only non-Council players permitted to observe Council sessions without explicit Council invitation. Other players cannot make room-wide announcements without working through the Media team.

  fleet-correspondent: |
    Full News Media freedom of movement — no ship table restrictions. Part of the broadcast team producing one ~4-minute report per turn with direct mechanical effects on fleet morale. News Media are the only non-Council players permitted to observe Council sessions without explicit Council invitation. Other players cannot make room-wide announcements without working through the Media team.

  military-correspondent: |
    Full News Media freedom of movement — no ship table restrictions. Part of the broadcast team producing one ~4-minute report per turn with direct mechanical effects on fleet morale. News Media are the only non-Council players permitted to observe Council sessions without explicit Council invitation. Other players cannot make room-wide announcements without working through the Media team.

  political-correspondent: |
    Full News Media freedom of movement — no ship table restrictions. Part of the broadcast team producing one ~4-minute report per turn with direct mechanical effects on fleet morale. News Media are the only non-Council players permitted to observe Council sessions without explicit Council invitation. Other players cannot make room-wide announcements without working through the Media team.

  # --- SOLO / WILDCARD ROLES ---

  arbourist: TBD

  inquisitor: TBD

  firebrand: TBD
