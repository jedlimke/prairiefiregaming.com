# Den of Wolves 2026 - Role Briefs
# Ultra-brief per-role reference sheet.
# logo-path fields are placeholders pending asset assignments.

briefs:

  # ─── ICSS AEGIS ───────────────────────────────────────────────────────────
  # The fleet's only battleship. Loyal to the Council; the shield that keeps
  # humanity alive.

  - name: Admiral
    team: Aegis
    logo-path: ""
    role-brief: |
      You command the **only battleship in the fleet**. The Aegis is the backbone of humanity's military power - and everyone knows it. Strategic decisions, high-level diplomacy, close liaison with the President. You serve the Council, but if a crisis demands immediate action, **act** - then answer for it afterward.

    duty-brief:
      $ref: "#/duties/admiral"
    nation-brief:
      $ref: "#/nations/ICS"
  - name: XO
    team: Aegis
    logo-path: ""
    role-brief: |
      You're second-in-command of the Aegis and direct commander of its **Marine squads**. When the Admiral is away (which is often), you're in command. When the Wolves attack, you coordinate Marine deployment across the entire fleet. Keep the crew sharp.

    duty-brief:
      $ref: "#/duties/xo"
    nation-brief:
      $ref: "#/nations/ICS"
  - name: CAG
    team: Aegis
    logo-path: ""
    role-brief: |
      As the CAG (Commander: Air Group), you control the Aegis' **fighter squadrons**. Pilot assignments, positioning, maintenance, and tactical deployment. The fleet's military superiority lives or dies by how well you manage those squadrons. Every pilot lost is a hole that's hard to fill.

    duty-brief:
      $ref: "#/duties/fwco"
    nation-brief:
      $ref: "#/nations/ICS"
  - name: Comms Officer
    team: Aegis
    logo-path: ""
    role-brief: |
      You're the **Aegis' eyes, ears, and voice** across the fleet. Gather intelligence for the Admiral. Push critical information to other ships. Third-in-command if both the Admiral and XO are gone. Stay mobile, stay informed, and make sure the right people always know what they need to know.

    duty-brief:
      $ref: "#/duties/comms-officer"
    nation-brief:
      $ref: "#/nations/ICS"
  - name: Logistics Officer
    team: Aegis
    logo-path: ""
    role-brief: |
      You keep the Aegis stocked with food, water, fuel, and materials — and may assist other vessels in also obtaining these critical resources, as **any ship that can't move is a tomb**. Furthermore, you oversee the ship's transport shuttles.  **Nothing moves without you.**

    duty-brief:
      $ref: "#/duties/logs-officer"
    nation-brief:
      $ref: "#/nations/ICS"
  - name: Council Liaison
    team: Aegis
    logo-path: ""
    role-brief: |
      You're the Admiral's authorized voice in the **Interstellar Council** chambers — you may speak but cannot vote. Strive to represent Aegis interests in political discussions and keep the crew briefed on everything happening in civilian government. You're the bridge between the military and the politicians.

    duty-brief:
      $ref: "#/duties/council-liaison"
    nation-brief:
      $ref: "#/nations/ICS"
  # ─── STAR ALPHA ───────────────────────────────────────────────────────────
  # The Presidential vessel. A small repurposed luxury ship that is the seat
  # of Executive power - and the last real government humanity has.

  - name: President
    team: Star Alpha
    logo-path: ""
    role-brief: |
      You're **humanity's head of state** - the last in succession after the Attack. You lead the Interstellar Council, sign laws passed by it, and serve as Commander-in-Chief of the military: the Admiral answers to **you**. Your political roots are FAS, but the law demands neutrality - and the fleet is watching. Keep the government strong. Keep the Admiral in line. **Keep the fleet together.**

    duty-brief:
      $ref: "#/duties/president"
    nation-brief:
      $ref: "#/nations/ICS"
  - name: Vice President
    team: Star Alpha
    logo-path: ""
    role-brief: |
      You're the President's **eyes and ears** across the fleet. Your job is to get off the Star Alpha and onto other ships - talk to people, take the temperature of the nations, stay tight with the Admiral - as well as the Parliamentarian. You cast the tie-breaking vote when Council is deadlocked. If something happens to the President, **you're next in line.**

    duty-brief:
      $ref: "#/duties/vice-president"
    nation-brief:
      $ref: "#/nations/ICS"
  - name: Chief of Staff
    team: Star Alpha
    logo-path: ""
    role-brief: |
      You run the Star Alpha's day-to-day operations: food, water, fuel, materials, security. You also support the President and VP on law enforcement when needed. The **administrative engine of the Presidency** runs through you - if politics is the face, you're the spine.

    duty-brief:
      $ref: "#/duties/chief-of-staff"
    nation-brief:
      $ref: "#/nations/ICS"
  - name: Parliamentarian
    team: Star Alpha
    logo-path: ""
    role-brief: |
      You draft the language of proposed laws and bring them before Council to vote on. You're also a voting Council member yourself. In a fleet with **no surviving legal infrastructure**, the precision of what gets written matters enormously. You're the architect of whatever new laws this remnant of humanity will live by.

    duty-brief:
      $ref: "#/duties/parliamentarian"
    nation-brief:
      $ref: "#/nations/ICS"
  # ─── THE DIONE (FAS) ──────────────────────────────────────────────────────
  # Luxury cruiser repurposed as home to 10,000 FAS civilians and the
  # Interstellar Council itself. The political heart of the fleet.

  - name: Captain
    team: Dione
    logo-path: ""
    role-brief: |
      You command the **largest civilian vessel in the fleet** and home to the Interstellar Council. The Dione carries ~10,000 FAS citizens and produces almost nothing - your ship needs the rest of the fleet to survive, and you'd better make sure they know it. Protect FAS prestige. Protect the Council's home on your ship. Do not let Rosal undermine you.

    duty-brief:
      $ref: "#/duties/captain"
    nation-brief:
      $ref: "#/nations/FAS"
  - name: First Officer
    team: Dione
    logo-path: ""
    role-brief: |
      You're the Captain's right hand on the **largest civilian ship in the fleet**. Ten thousand FAS citizens are counting on you to keep the lights on and the panic down. The Council meets on your ship - make sure they never forget whose hospitality they enjoy.

    duty-brief:
      $ref: "#/duties/first-officer"
    nation-brief:
      $ref: "#/nations/FAS"
  - name: Chief Engineer
    team: Dione
    logo-path: ""
    role-brief: |
      You're keeping a **luxury cruiser** operational with 10,000 civilians and zero industrial capacity. The Dione is elegant, fragile, and politically can't afford to look weak. Every breakdown is a crisis - don't let one happen.

    duty-brief:
      $ref: "#/duties/chief-engineer"
    nation-brief:
      $ref: "#/nations/FAS"
  - name: Council Member
    team: Dione
    logo-path: ""
    role-brief: |
      **FAS representative** on the Interstellar Council. You vote on all legislation. Defend Old Nation interests, keep Rosal in check, and maintain the coalition with CPA and SAN. The Council physically meets on your ship - use that home-field advantage. Oppose any move to relocate it.

    duty-brief:
      $ref: "#/duties/council-member"
    nation-brief:
      $ref: "#/nations/FAS"
  # ─── THE SHEPHERD (ROSAL) ─────────────────────────────────────────────────
  # The fleet's primary food production vessel. Rosal's independent spirit
  # is as important as the calories it grows.

  - name: Captain
    team: Shepherd
    logo-path: ""
    role-brief: |
      You command the **ship that feeds the fleet**. Without the Shepherd's food production, people starve - and you know it. Use that leverage firmly but wisely. You represent Rosal's proud tradition of self-determination and standing up to Old Nation dominance. Keep the food flowing. Keep Rosal relevant.

    duty-brief:
      $ref: "#/duties/captain"
    nation-brief:
      $ref: "#/nations/Rosal"
  - name: First Officer
    team: Shepherd
    logo-path: ""
    role-brief: |
      You keep the **ship that feeds the fleet** running. The Shepherd's leverage is absolute - but so is the weight on your shoulders. Embody Rosal's independent spirit. Never back down to Old Nation pressure. Not once.

    duty-brief:
      $ref: "#/duties/first-officer"
    nation-brief:
      $ref: "#/nations/Rosal"
  - name: Chief Engineer
    team: Shepherd
    logo-path: ""
    role-brief: |
      The biological and mechanical systems you maintain **literally keep the fleet fed**. A breakdown here is a fleet emergency - which gives you serious political weight. Use it. Rosal didn't get this far by being polite.

    duty-brief:
      $ref: "#/duties/chief-engineer"
    nation-brief:
      $ref: "#/nations/Rosal"
  - name: Council Member
    team: Shepherd
    logo-path: ""
    role-brief: |
      **Rosal representative** on the Interstellar Council. You vote on legislation and advocate loudly for New Nation rights. You may spend Team Phase at either the Shepherd or the Endeavour. Push back against Old Nation power. Keep the FAS honest. Build coalition with Gliese and Helvetii.

    duty-brief:
      $ref: "#/duties/council-member"
    nation-brief:
      $ref: "#/nations/Rosal"
  # ─── THE LUCAS (SAN) ──────────────────────────────────────────────────────
  # Primary water supply vessel and home to SAN engineering expertise.

  - name: Captain
    team: Lucas
    logo-path: ""
    role-brief: |
      You command the fleet's **main water supplier**. The Lucas' distillation units provide most of the fleet's fresh water - an existential resource. Protect the ship and shuttle at all costs. SAN's reputation as an engineering and technical powerhouse lives on here. Use it.

    duty-brief:
      $ref: "#/duties/captain"
    nation-brief:
      $ref: "#/nations/SAN"
  - name: First Officer
    team: Lucas
    logo-path: ""
    role-brief: |
      The Lucas supplies **most of the fleet's water** and hosts what's left of SAN's engineering university. Keep operations tight. Support the training programs. SAN's reputation as the technical powerhouse is your nation's strongest card - play it well.

    duty-brief:
      $ref: "#/duties/first-officer"
    nation-brief:
      $ref: "#/nations/SAN"
  - name: Chief Engineer
    team: Lucas
    logo-path: ""
    role-brief: |
      You maintain the water distillation systems and oversee what's left of **SAN's Engineering University**. You can train engineers fleet-wide - a capability that makes you one of the most strategically important engineers alive. People need water. They also need knowledge. You supply both.

    duty-brief:
      $ref: "#/duties/chief-engineer"
    nation-brief:
      $ref: "#/nations/SAN"
  - name: Council Member
    team: Lucas
    logo-path: ""
    role-brief: |
      **SAN representative** on the Interstellar Council. You vote on legislation. You may spend Team Phase at the Lucas or Salvador. Maintain Old Nation alliances (especially with the CPA), figure out why the CPA has gone so quiet lately, and make sure the fleet knows water comes from **you**.

    duty-brief:
      $ref: "#/duties/council-member"
    nation-brief:
      $ref: "#/nations/SAN"
  # ─── THE ICEBREAKER (CPA) ─────────────────────────────────────────────────
  # Large CPA mining vessel - the fleet's main source of materials and ore.
  # Crewed by survivors with raw grief and a vendetta against the Wolves.

  - name: Captain
    team: Icebreaker
    logo-path: ""
    role-brief: |
      You command the **fleet's primary mining ship** - main source of materials and strytium ore. The CPA lost more than anyone in the Attack. Your people's grief is real and sharp. Maintain production. Protect the fleet's industrial backbone. Make sure no one forgets what the Wolves did.

    duty-brief:
      $ref: "#/duties/captain"
    nation-brief:
      $ref: "#/nations/CPA"
  - name: First Officer
    team: Icebreaker
    logo-path: ""
    role-brief: |
      The CPA **lost more than any other nation** in the Wolf Attack. Your crew's grief is real, sharp, and yours to manage. Keep the mining operations running. Keep the civilians stable. But never - **never** - forget what was taken from you.

    duty-brief:
      $ref: "#/duties/first-officer"
    nation-brief:
      $ref: "#/nations/CPA"
  - name: Chief Engineer
    team: Icebreaker
    logo-path: ""
    role-brief: |
      The Icebreaker's mining drones are the **fleet's industrial backbone**. Keep them operational no matter what. Every piece of ore you extract is a small victory over the Wolves who tried to destroy everything. Make every ton count.

    duty-brief:
      $ref: "#/duties/chief-engineer"
    nation-brief:
      $ref: "#/nations/CPA"
  - name: Council Member
    team: Icebreaker
    logo-path: ""
    role-brief: |
      **CPA representative** on the Interstellar Council. You vote on legislation. Defend Old Nation alliances and make sure the fleet never becomes sympathetic to the Wolves. Push for surveillance and proactive anti-Wolf measures. The CPA paid the **highest price** in the Attack - make sure that sacrifice carries political weight.

    duty-brief:
      $ref: "#/duties/council-member"
    nation-brief:
      $ref: "#/nations/CPA"
  # ─── REFINERY 124 (GLIESE) ────────────────────────────────────────────────
  # The fleet's fuel source. Without strytium, the fleet stops running.

  - name: Captain
    team: Refinery 124
    logo-path: ""
    role-brief: |
      You command the ship that **keeps the fleet moving**. Refinery 124 processes strytium ore into fuel every vessel needs to survive. Gliese's strength has always been quiet, industrial, essential - you embody that. Use your resource leverage as soft power in Council. Ensure workers' rights are never an afterthought.

    duty-brief:
      $ref: "#/duties/captain"
    nation-brief:
      $ref: "#/nations/Gliese"
  - name: First Officer
    team: Refinery 124
    logo-path: ""
    role-brief: |
      Without strytium fuel, the fleet **stops moving**. Your ship produces it. Gliese has always been quiet, essential, underestimated. Embody that. Let the fuel tap do the talking. Soft power beats loud rhetoric every single time.

    duty-brief:
      $ref: "#/duties/first-officer"
    nation-brief:
      $ref: "#/nations/Gliese"
  - name: Chief Engineer
    team: Refinery 124
    logo-path: ""
    role-brief: |
      You run the **most technically demanding operation in the fleet**. Downtime here is a fleet-wide emergency. That makes you one of the most strategically critical engineers alive. Don't let the fleet forget it.

    duty-brief:
      $ref: "#/duties/chief-engineer"
    nation-brief:
      $ref: "#/nations/Gliese"
  - name: Council Member
    team: Refinery 124
    logo-path: ""
    role-brief: |
      **Gliese representative** on the Interstellar Council. You vote on legislation. Gliese prefers soft power to loud rhetoric - let the **fuel tap** speak. Ally with Rosal on New Nation issues, advocate for workers' rights and efficient resource policy, and call out inefficiency wherever you find it.

    duty-brief:
      $ref: "#/duties/council-member"
    nation-brief:
      $ref: "#/nations/Gliese"
  # ─── THE QUELLON (PROXIMA) ────────────────────────────────────────────────
  # Proxima's operations vessel - water supply, fighter squadrons,
  # and fierce self-reliance.

  - name: Captain
    team: Quellon
    logo-path: ""
    role-brief: |
      You command **Proxima's primary vessel** - a significant water producer and fighter carrier. Proxima's identity is self-sufficiency. Live it. Protect Proximan interests, keep your fighters ready, and never let anyone tell you Proxima needs to depend on others to survive.

    duty-brief:
      $ref: "#/duties/captain"
    nation-brief:
      $ref: "#/nations/Proxima"
  - name: First Officer
    team: Quellon
    logo-path: ""
    role-brief: |
      Proxima's pride is **self-sufficiency**. The Quellon produces water and fields fighters - living proof you don't need anyone's charity. Keep operations tight. Never give the Old Nations an excuse to condescend. Not even once.

    duty-brief:
      $ref: "#/duties/first-officer"
    nation-brief:
      $ref: "#/nations/Proxima"
  - name: Chief Engineer
    team: Quellon
    logo-path: ""
    role-brief: |
      Proxima doesn't ask for hand-outs. Your job is to make sure the Quellon **never has to**. Self-sufficiency isn't just politics - it's engineering discipline. Live it.

    duty-brief:
      $ref: "#/duties/chief-engineer"
    nation-brief:
      $ref: "#/nations/Proxima"
  - name: Council Member
    team: Quellon
    logo-path: ""
    role-brief: |
      **Proxima representative** on the Interstellar Council. You vote on legislation. You may spend Team Phase at the Quellon or the Vulcan. Advocate hard for Proximan self-sufficiency and redundancy fleet-wide. Push back against Old Nation dominance. Keep close ties with the Vulcan crew.

    duty-brief:
      $ref: "#/duties/council-member"
    nation-brief:
      $ref: "#/nations/Proxima"
  # ─── THE ENDEAVOR (ROSAL) ─────────────────────────────────────────────────
  # A small research vessel - home to most of humanity's remaining scientists,
  # one golden retriever, and one chimpanzee.

  - name: Captain
    team: Endeavor
    logo-path: ""
    role-brief: |
      You command the most **scientifically important ship in the fleet**. The Endeavor carries the majority of humanity's surviving scientists - if something can be figured out, it gets figured out here. Protect your crew. Manage the politics between Rosal idealism and scientific pragmatism. Make sure the scientists stay focused on keeping the fleet alive.

    duty-brief:
      $ref: "#/duties/captain"
    nation-brief:
      $ref: "#/nations/Rosal"
  - name: Chief Scientist
    team: Endeavor
    logo-path: ""
    role-brief: |
      You lead **humanity's last surviving research faculty**. Your team develops upgrades and technical solutions for all fleet vessels. Be creative - propose ambitious projects. Reach out to the Baltar for collaboration. Watch for religious or political interference with scientific progress. Remember: the fleet survives on human ingenuity.

    duty-brief:
      $ref: "#/duties/chief-scientist"
    nation-brief:
      $ref: "#/nations/Rosal"
  # ─── THE SALVADOR (SAN) ───────────────────────────────────────────────────
  # The fleet's only hospital ship.

  - name: Captain
    team: Salvador
    logo-path: ""
    role-brief: |
      You command the **only dedicated medical vessel in the fleet**. The Salvador is small but indispensable. Make sure medical services run, your crew is supported, and SAN's voice is heard through the Lucas Council member. Keep close ties with the Lucas. Do not let anyone overlook the Salvador's role in keeping people alive.

    duty-brief:
      $ref: "#/duties/captain"
    nation-brief:
      $ref: "#/nations/SAN"
  - name: Head Surgeon
    team: Salvador
    logo-path: ""
    role-brief: |
      You're the **most experienced doctor alive** - practically the only one. Treat the wounded. Train more doctors. Advocate for medical staffing across the fleet. You have some creative pharmaceutical ideas worth exploring - the Endeavor's scientists may be useful partners. You're also deeply concerned about the prisoners on the Vulcan. What you do about that concern is up to you.

    duty-brief:
      $ref: "#/duties/head-surgeon"
    nation-brief:
      $ref: "#/nations/SAN"
  # ─── THE VULCAN (PROXIMA) ─────────────────────────────────────────────────
  # A prison transport that earned its place in the fleet through firepower
  # and labor.

  - name: Captain
    team: Vulcan
    logo-path: ""
    role-brief: |
      You command a **prison transport** with weapon batteries and 413 prisoners. Your arrival in the fleet was controversial. Prove the Vulcan's worth through firepower and labor. Defend Proximan interests. Don't apologize for what you are.

    duty-brief:
      $ref: "#/duties/captain"
    nation-brief:
      $ref: "#/nations/Proxima"
  - name: Warden
    team: Vulcan
    logo-path: ""
    role-brief: |
      You manage the **prison population** - a source of labor the fleet needs but doesn't fully trust. Keep the prisoners productive. Keep them under control. Resist the Salvador's insinuations that your crew mistreats them. Your labor pool and the Vulcan's weapons are Proxima's biggest contributions to fleet survival.

    duty-brief:
      $ref: "#/duties/warden"
    nation-brief:
      $ref: "#/nations/Proxima"
  # ─── PRESS ────────────────────────────────────────────────────────────────
  # The fleet's news media - information brokers, morale shapers, and the
  # closest thing to accountability this remnant of humanity has.

  - name: Editor-in-Chief
    team: INC
    logo-path: ""
    role-brief: |
      You lead the **news media team** - the only organization in the fleet with unrestricted freedom of movement. Oversee editorial direction, manage the broadcast schedule, allocate your reporters strategically. Your team shapes morale across the fleet: positive coverage helps ships, negative coverage hurts. Broadcast power is real power. Use it seriously, not sensationally.

    duty-brief:
      $ref: "#/duties/editor-in-chief"
    nation-brief:
      $ref: "#/nations/INC"
  - name: Lead Anchor
    team: INC
    logo-path: ""
    role-brief: |
      You chase the **big story**. You have the instincts and source network to get information others can't. Cultivate relationships with key players. Break the most important stories of the game. Always know more than you let on. You have freedom of movement - use it to be where history happens.

    duty-brief:
      $ref: "#/duties/lead-anchor"
    nation-brief:
      $ref: "#/nations/INC"
  - name: Fleet Correspondent
    team: INC
    logo-path: ""
    role-brief: |
      You cover the **fleet's day-to-day pulse** - ship operations, civilian conditions, inter-vessel relationships. You're the generalist on the team, circulating widely and building relationships across all ships. Look for the human stories that shape morale.

    duty-brief:
      $ref: "#/duties/fleet-correspondent"
    nation-brief:
      $ref: "#/nations/INC"
  - name: Military Correspondent
    team: INC
    logo-path: ""
    role-brief: |
      You cover the **military side of the fleet** - the Aegis, the Javelin, the Vulcan, and tactical events during Wolf attacks. Build trust with the Admiral and military leadership to get access while retaining editorial independence. Report on battles, readiness, and the human cost of war.

    duty-brief:
      $ref: "#/duties/military-correspondent"
    nation-brief:
      $ref: "#/nations/INC"
  - name: Political Correspondent
    team: INC
    logo-path: ""
    role-brief: |
      You cover the **Council, the Presidency**, and political maneuvering between nations. You're allowed to observe Council proceedings - a rare privilege. Track legislation, alliances, vote tallies, and the gap between what politicians say publicly and what they do privately.

    duty-brief:
      $ref: "#/duties/political-correspondent"
    nation-brief:
      $ref: "#/nations/INC"
  # ─── SOLO ROLES ───────────────────────────────────────────────────────────

  - name: Arbourist
    team: Solo Roles
    logo-path: ""
    role-brief: |
      You're the **Prophet of the Universal Arbour** - a rapidly growing new religion built on the belief that the Universe is sentient and speaks to you through visions. Weeks ago you had dozens of followers. Now you have hundreds, and growing. You roam the entire fleet freely. Gain followers. Gain political influence. Decide what kind of prophet you want to be: shepherd, demagogue, or revolutionary. This role is freeform and roleplay-heavy.

    duty-brief:
      $ref: "#/duties/arbourist"
  - name: Inquisitor
    team: Solo Roles
    logo-path: ""
    role-brief: |
      You're the **last Inquisitor General in the fleet** - Proxima's surviving judicial authority, and the only judicial authority of any kind. Judge, jury, and prosecutor. Your power is technically unlimited but practically tenuous: the Council can curtail you if you go too far. Investigate traitors. Root out Wolf agents. Keep an independent judiciary alive. You start aboard the Star Alpha and can move freely.

    duty-brief:
      $ref: "#/duties/inquisitor"
  - name: Firebrand
    team: Solo Roles
    logo-path: ""
    role-brief: |
      You're a **Gliese political prisoner** - populist, charismatic, and just released after a decade of imprisonment for anti-FAS activism. A stencil of your face is a symbol of resistance across what's left of human space. You were on the Vulcan when the Attack happened, your sentence was illegally extended, and you're now being held on the Aegis. Once free, your voice could reshape the fleet's politics. You have strong support among workers and prisoners. Use it - or decide what it means that you have it.

    duty-brief:
      $ref: "#/duties/firebrand"
  # ─── THE HEPHAESTUS (HELVETII) ────────────────────────────────────────────
  # A patchwork industrial vessel crewed entirely by pardoned former criminals
  # on a Helvetii rehabilitation program.

  - name: Captain
    team: Hephaestus
    logo-path: ""
    role-brief: |
      You command a jury-rigged industrial jack-of-all-trades crewed by **reformed criminals** in the Helvetii rehabilitation program. They're rowdy but capable. Your ship has prospecting lasers, a makeshift refinery, repair facilities - plus Riot Police for when the crew gets out of hand. Maintain neutrality. Push for free trade. Prove Helvetii belongs at the table.

    duty-brief:
      $ref: "#/duties/captain"
    nation-brief:
      $ref: "#/nations/Helvetii"
  - name: First Officer
    team: Hephaestus
    logo-path: ""
    role-brief: |
      You manage a crew of **reformed criminals** every single day. They're capable but volatile. Balance operational discipline with Helvetii's rehabilitation philosophy - and know when the Riot Police are the only answer left.

    duty-brief:
      $ref: "#/duties/first-officer"
    nation-brief:
      $ref: "#/nations/Helvetii"
  - name: Chief Engineer
    team: Hephaestus
    logo-path: ""
    role-brief: |
      You maintain a ship so heavily modified its original designers wouldn't recognize it - and you've **made it work**. Your breakthrough: alloying scrap metal into military-grade armor plating. That innovation could save lives fleet-wide. Make sure it does.

    duty-brief:
      $ref: "#/duties/chief-engineer"
    nation-brief:
      $ref: "#/nations/Helvetii"
  - name: Diplomat (Council Member)
    team: Hephaestus
    logo-path: ""
    role-brief: |
      **Helvetii representative** in the Interstellar Council - junior member status, which means you may speak but cannot vote (yet). You may spend Team Phase at either Helvetii vessel. Push for full Council membership. Advocate for free trade and neutral arbitration. Consider whether the role of Parliamentarian might one day be yours.

    duty-brief:
      $ref: "#/duties/diplomat"
    nation-brief:
      $ref: "#/nations/Helvetii"
  # ─── THE BALTAR (HELVETII) ────────────────────────────────────────────────
  # A cutting-edge Helvetii research vessel with a multinational science crew.

  - name: Captain
    team: Baltar
    logo-path: ""
    role-brief: |
      You command Helvetii's **state-of-the-art research ship**, purpose-built for long-range scanning and resource prospecting. Your crew is multinational and doesn't feel tightly bound to Helvetii neutrality. Find asteroids. Find resources. Find opportunities - and forge your own political identity distinct from the Hephaestus' orthodoxy.

    duty-brief:
      $ref: "#/duties/captain"
    nation-brief:
      $ref: "#/nations/Helvetii"
  - name: Chief Scientist
    team: Baltar
    logo-path: ""
    role-brief: |
      You lead a **multinational science team** in physical and material sciences, long-range observation, and resource prospecting. Reach out to the Endeavor - your research overlaps with theirs in important ways, and collaboration could benefit the whole fleet. Your team's independence from Helvetii neutrality is a feature, not a bug.

    duty-brief:
      $ref: "#/duties/chief-scientist"
    nation-brief:
      $ref: "#/nations/Helvetii"
  # ─── ICSS JAVELIN ─────────────────────────────────────────────────────────
  # The fleet's newest missile boat - green crew, prototype weapons, and a
  # burning desire to hit back.

  - name: Captain
    team: Javelin
    logo-path: ""
    role-brief: |
      You were still on **shakedown cruise** when the Attack happened. Your crew watched Old Earth burn from Jupiter orbit - they're green, but they're furious. The Javelin's prototype missiles are powerful and expensive. You answer to the Admiral. But if there's a clear shot at the Wolves? You'll take it.

    duty-brief:
      $ref: "#/duties/captain"
    nation-brief:
      $ref: "#/nations/ICS"
  - name: XO
    team: Javelin
    logo-path: ""
    role-brief: |
      You command the Javelin's **Marines**. When the Captain is at the Fleet Map directing missiles, you're here coordinating defense against boarders. Your Marines are sharp and motivated - young, angry, and ready to fight. Keep them that way.

    duty-brief:
      $ref: "#/duties/xo"
    nation-brief:
      $ref: "#/nations/ICS"
  - name: Chief Engineer
    team: Javelin
    logo-path: ""
    role-brief: |
      You maintain **prototype missile launchers** that are finicky and temperamental. No food or water synthesizers means you're constantly begging other ships for supplies. Keep the Javelin battle-ready despite being the fleet's newest - and least self-sufficient - warship.

    duty-brief:
      $ref: "#/duties/chief-engineer"
    nation-brief:
      $ref: "#/nations/ICS"
  - name: Staff Sergeant
    team: Javelin
    logo-path: ""
    role-brief: |
      The Marines take orders from the XO, but they **listen** to you. Battle-hardened and respected. Keep your people alive, execute the XO's tactical orders, and make sure the Javelin's ground forces hit harder than anything the Wolves expect.

    duty-brief:
      $ref: "#/duties/staff-sergeant"
    nation-brief:
      $ref: "#/nations/ICS"
  # ─── THE FUERZA LEON (CPA) ────────────────────────────────────────────────
  # A CPA bulk hauler with vast, disorganized cargo bays and a crew of
  # skilled specialists traveling aboard as passengers.

  - name: Captain
    team: Fuerza Leon
    logo-path: ""
    role-brief: |
      You command a **CPA bulk hauler** whose cargo was partially jettisoned during emergency jumps. The remaining cargo is disorganized, the manifest is scrambled, and several highly skilled CPA specialists are aboard as passengers. Those specialists are your biggest asset - work with your Council member to use them as bargaining chips. Your empty bays could be converted into anything the fleet needs.

    duty-brief:
      $ref: "#/duties/captain"
    nation-brief:
      $ref: "#/nations/CPA"
  - name: First Officer
    team: Fuerza Leon
    logo-path: ""
    role-brief: |
      You're running a ship with **minimal permanent crew**, a scrambled manifest, and a roster of CPA specialist passengers who outrank you in expertise. Keep everyone organized. Keep the ship operational. Help the Captain turn chaos into opportunity - the CPA needs wins.

    duty-brief:
      $ref: "#/duties/first-officer"
    nation-brief:
      $ref: "#/nations/CPA"
